name: MdEditor
options:
  bundleIdPrefix: com.mdeditor
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  developmentLanguage: en

targets:
  MdEditor:
    type: application
    platform: macOS
    sources:
      - MdEditor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdeditor.MdEditor
        PRODUCT_NAME: MdEditor
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: MdEditor/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: MdEditor/MdEditor.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS: "-framework SwiftUI"
    entitlements:
      path: MdEditor/MdEditor.entitlements
